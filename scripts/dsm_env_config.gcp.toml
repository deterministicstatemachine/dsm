# DSM environment config — GCP storage nodes (6-node, 3-region)
# Push to device with: scripts/push_env_override.sh --gcp
#
# Nodes:
#   us-east1:         34.73.141.32, 35.243.157.151
#   europe-west1:     35.205.9.157, 34.53.251.120
#   asia-southeast1:  34.21.157.56, 34.87.93.29

protocol = "https"
lan_ip = "0.0.0.0"
allow_localhost = false
storage_node_mode = "remote"
ports = [8080]

bitcoin_network = "signet"
dbtc_min_confirmations = 1
mempool_api_url = "https://mempool.space"

# Self-signed CA for GCP storage node TLS certs
# Path is relative to this config file's directory (resolved by SDK).
custom_ca_certs = ["ca.crt"]

[[nodes]]
name = "us-east1-a"
endpoint = "https://34.73.141.32:8080"

[[nodes]]
name = "us-east1-b"
endpoint = "https://35.243.157.151:8080"

[[nodes]]
name = "europe-west1-a"
endpoint = "https://35.205.9.157:8080"

[[nodes]]
name = "europe-west1-b"
endpoint = "https://34.53.251.120:8080"

[[nodes]]
name = "asia-southeast1-a"
endpoint = "https://34.21.157.56:8080"

[[nodes]]
name = "asia-southeast1-b"
endpoint = "https://34.87.93.29:8080"
