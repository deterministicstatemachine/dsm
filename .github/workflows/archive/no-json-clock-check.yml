name: 'No-JSON-No-Clock Check'

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ main, master, auto ]

jobs:
  ban_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run no-clock-and-no-json gate
        run: |
          chmod +x ci/no_clock_and_no_json.sh
          ./ci/no_clock_and_no_json.sh
